<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Bapuji Uniform Management</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root{--pr:#1a73e8;--pd:#1557b0;--gr:#34a853;--re:#ea4335;--sw:240px}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif}
body{background:#f0f4f8;color:#333}
#lp{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1a73e8,#34a853)}
.lcard{background:#fff;border-radius:16px;padding:36px;width:420px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.llogo{text-align:center;margin-bottom:20px}
.llogo h1{font-size:20px;color:var(--pr);font-weight:800}
.llogo p{color:#888;font-size:12px;margin-top:3px}
.fg{margin-bottom:13px}
.fg label{display:block;font-size:11px;font-weight:700;color:#555;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.fg input,.fg select,.fg textarea{width:100%;padding:9px 12px;border:1.5px solid #ddd;border-radius:8px;font-size:14px;background:#fff;transition:border .2s}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:var(--pr)}
.btn{padding:9px 18px;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:700;display:inline-flex;align-items:center;gap:6px;transition:all .15s}
.bp{background:var(--pr);color:#fff}.bp:hover{background:var(--pd)}
.bg{background:var(--gr);color:#fff}
.br{background:var(--re);color:#fff}
.bo{background:#fff;border:1.5px solid #ddd;color:#555}.bo:hover{border-color:var(--pr);color:var(--pr)}
.bsm{padding:5px 11px;font-size:12px}
.bfl{width:100%;justify-content:center}
#app{display:flex;min-height:100vh}
#sb{width:var(--sw);background:#1e2a3a;color:#fff;display:flex;flex-direction:column;position:fixed;height:100vh;z-index:100}
.sbh{padding:18px 16px;background:#111d2e;border-bottom:1px solid rgba(255,255,255,.1)}
.sbh h2{font-size:15px;font-weight:800;color:#4fc3f7}
.sbh p{font-size:11px;color:#90a4ae;margin-top:2px}
.sbu{padding:12px 16px;background:#162230;border-bottom:1px solid rgba(255,255,255,.05);display:flex;align-items:center;gap:10px}
.av{width:36px;height:36px;background:var(--pr);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800}
.un{font-size:13px;font-weight:700;display:block}
.ur{font-size:11px;color:#90a4ae;display:block}
nav{flex:1;overflow-y:auto;padding:6px 0}
nav a{display:flex;align-items:center;gap:10px;padding:11px 16px;color:#90a4ae;font-size:13px;font-weight:600;cursor:pointer;border-left:3px solid transparent;transition:all .15s}
nav a:hover,nav a.act{color:#fff;background:rgba(255,255,255,.08);border-left-color:var(--pr)}
nav a i{width:18px;text-align:center}
.ns{padding:8px 16px 3px;font-size:10px;text-transform:uppercase;letter-spacing:1px;color:#546e7a;font-weight:700}
.sbf{padding:12px 16px;border-top:1px solid rgba(255,255,255,.1)}
#mn{margin-left:var(--sw);flex:1;display:flex;flex-direction:column;min-width:0}
#hd{height:60px;background:#fff;border-bottom:1px solid #e0e0e0;display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:50;box-shadow:0 1px 4px rgba(0,0,0,.07)}
#hd h1{font-size:18px;font-weight:800}
.ha{display:flex;gap:8px;flex-wrap:wrap}
#ct{padding:24px;flex:1}
.card{background:#fff;border-radius:12px;box-shadow:0 1px 6px rgba(0,0,0,.09);margin-bottom:20px}
.ch{padding:15px 20px;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.ch h3{font-size:15px;font-weight:800}
.cb{padding:20px}
.kg{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:20px}
.kc{background:#fff;border-radius:12px;padding:18px;box-shadow:0 1px 6px rgba(0,0,0,.09);display:flex;align-items:center;gap:14px}
.ki{width:50px;height:50px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px}
.kv{font-size:22px;font-weight:900}
.kl{font-size:12px;color:#777;margin-top:2px}
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:#f8f9fa;color:#555;font-weight:700;font-size:12px;padding:10px 14px;text-align:left;border-bottom:2px solid #e8e8e8;white-space:nowrap}
td{padding:9px 14px;border-bottom:1px solid #f5f5f5}
tr:hover td{background:#f8f9ff}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
.bgs{background:#e8f5e9;color:#2e7d32}.bds{background:#ffebee;color:#c62828}.bws{background:#fff8e1;color:#e65100}.bis{background:#e3f2fd;color:#1565c0}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;z-index:1000}
.md{background:#fff;border-radius:16px;width:580px;max-width:96vw;max-height:92vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.mh{padding:18px 24px;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;z-index:2}
.mh h3{font-size:16px;font-weight:800}
.mc{cursor:pointer;color:#aaa;font-size:22px}.mc:hover{color:#333}
.mb{padding:22px 24px}
.mf{padding:14px 24px;border-top:1px solid #f0f0f0;display:flex;justify-content:flex-end;gap:8px;background:#fafafa;border-radius:0 0 16px 16px}
#tc{position:fixed;top:70px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{padding:11px 18px;border-radius:8px;color:#fff;font-size:13px;font-weight:700;box-shadow:0 4px 14px rgba(0,0,0,.2);animation:si .25s ease;display:flex;align-items:center;gap:8px;min-width:260px}
.ts{background:#2e7d32}.te{background:#c62828}.ti{background:#1565c0}
@keyframes si{from{transform:translateX(80px);opacity:0}to{transform:translateX(0);opacity:1}}
.ald{background:#ffebee;color:#c62828;border:1px solid #ffcdd2;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:12px}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.st{width:100%;border-collapse:collapse;font-size:13px;margin-top:8px}
.st th{background:#f5f5f5;padding:7px 10px;font-size:12px}
.st td{padding:5px 8px;border-top:1px solid #f0f0f0}
.st input{width:100%;padding:4px 8px;border:1.5px solid #ddd;border-radius:5px;font-size:12px}
.ld{display:flex;align-items:center;justify-content:center;padding:50px;color:#aaa}
.sp{width:30px;height:30px;border:3px solid #f0f0f0;border-top-color:var(--pr);border-radius:50%;animation:spin .8s linear infinite;margin-right:10px}
@keyframes spin{to{transform:rotate(360deg)}}
.sl{color:#c62828;font-weight:700}.sk{color:#2e7d32}
.es{text-align:center;padding:50px 20px;color:#aaa}
.es i{font-size:44px;margin-bottom:10px;display:block}
.sr{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
.sr input,.sr select{padding:8px 12px;border:1.5px solid #ddd;border-radius:8px;font-size:13px}
.spl{background:#f0f4f8;border-radius:8px;padding:9px 14px;font-size:13px;font-weight:600;color:#555}
.spl span{color:var(--pr)}
.smr{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px}
.sbn{background:#fff3e0;border:1.5px solid #ffb74d;border-radius:10px;padding:14px 18px;margin-bottom:18px;display:flex;align-items:center;gap:12px;font-size:13px}
.rc{font-family:'Courier New',monospace;font-size:12px}
.rh{text-align:center;padding:16px;border-bottom:2px dashed #333}
.rh h2{font-size:18px;font-weight:900}
.rm{padding:10px 18px;display:flex;justify-content:space-between;font-size:12px;border-bottom:1px dashed #aaa}
.ri{padding:10px 18px}
.ri table{width:100%;font-size:12px}
.ri th,.ri td{padding:4px 6px}
.rt{padding:10px 18px;border-top:2px dashed #333;text-align:right}
.rt .gt{font-size:16px;font-weight:900;margin-top:6px}
.rf{text-align:center;padding:10px 18px;font-size:11px;color:#666;border-top:1px dashed #aaa}
.pw{display:flex;flex-wrap:wrap;gap:8px}
.pl{display:inline-flex;align-items:center;gap:6px;background:#f0f4f8;border:1.5px solid #ddd;border-radius:8px;padding:6px 12px;font-size:13px;font-weight:600}
.px{cursor:pointer;color:#c62828;font-size:16px;line-height:1;font-weight:900}
.ma{display:flex;gap:8px;margin-bottom:16px}
.ma input{flex:1;padding:9px 12px;border:1.5px solid #ddd;border-radius:8px;font-size:13px}
.ma input:focus{outline:none;border-color:var(--pr)}
.psm{display:flex;gap:10px;margin-bottom:16px}
.pb{flex:1;border-radius:10px;padding:12px;text-align:center}
.pb .pl2{font-size:11px;color:#777;margin-bottom:4px}
.pb .pv{font-size:18px;font-weight:900}
.url-banner{background:#e8f5e9;border:1.5px solid #a5d6a7;border-radius:10px;padding:12px 16px;margin-bottom:14px;font-size:13px;color:#2e7d32}
.url-banner.warn{background:#fff3e0;border-color:#ffcc80;color:#e65100}
@media print{body *{visibility:hidden}#rp,#rp *{visibility:visible}#rp{position:fixed;inset:0;padding:20px}}
@media(max-width:900px){.kg{grid-template-columns:1fr 1fr}.fr{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="tc"></div>
<div id="rp" style="display:none"></div>

<!-- ── LOGIN ─────────────────────────────────────────────── -->
<div id="lp">
  <div class="lcard">
    <div class="llogo">
      <div style="font-size:42px">🎒</div>
      <h1>Bapuji Uniform Management</h1>
      <p>Bapuji Educational Institutions</p>
    </div>
    <div id="la"></div>
    <div class="fg"><label>Username</label><input id="lu" value="admin" placeholder="Enter username"></div>
    <div class="fg"><label>Password</label><input id="lp2" type="password" value="admin123" placeholder="Enter password"></div>
    <button class="btn bp bfl" id="lbtn" onclick="doLogin()" style="margin-top:10px;padding:12px;font-size:15px">
      <i class="fas fa-sign-in-alt"></i> Login
    </button>
    <p style="text-align:center;font-size:12px;color:#aaa;margin-top:12px">
      Demo: <strong>admin / admin123</strong>
    </p>
  </div>
</div>

<!-- ── APP ───────────────────────────────────────────────── -->
<div id="app" style="display:none">
  <div id="sb">
    <div class="sbh"><h2>🎒 Bapuji</h2><p>Uniform Management</p></div>
    <div class="sbu">
      <div class="av" id="uav">A</div>
      <div><span class="un" id="uname">Admin</span><span class="ur" id="urole">Administrator</span></div>
    </div>
    <nav>
      <a onclick="sp('dash')" id="nav-dash"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
      <div class="ns">Sales &amp; Billing</div>
      <a onclick="sp('bill')" id="nav-bill"><i class="fas fa-file-invoice"></i> New Bill</a>
      <a onclick="sp('bills')" id="nav-bills"><i class="fas fa-list-alt"></i> All Bills</a>
      <div class="ns">Stock</div>
      <a onclick="sp('uni')" id="nav-uni"><i class="fas fa-tshirt"></i> Uniforms</a>
      <a onclick="sp('inv')" id="nav-inv"><i class="fas fa-boxes"></i> Inventory</a>
      <a onclick="sp('pur')" id="nav-pur"><i class="fas fa-truck"></i> Purchase Inward</a>
      <div class="ns">Analytics</div>
      <a onclick="sp('rpt')" id="nav-rpt"><i class="fas fa-chart-bar"></i> Reports</a>
      <a onclick="sp('bal')" id="nav-bal"><i class="fas fa-warehouse"></i> Balance Stock</a>
      <div class="ns aos">Admin</div>
      <a onclick="sp('usr')" id="nav-usr" class="ao"><i class="fas fa-users-cog"></i> Users</a>
      <a onclick="sp('set')" id="nav-set"><i class="fas fa-cog"></i> Settings</a>
    </nav>
    <div class="sbf">
      <button class="btn bo bsm bfl" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
    </div>
  </div>
  <div id="mn">
    <div id="hd"><h1 id="pt">Dashboard</h1><div class="ha" id="ha"></div></div>
    <div id="ct"><div class="ld"><div class="sp"></div> Loading...</div></div>
  </div>
</div>

<script>
// ============================================================
// CONFIG — paste your Apps Script URL once here
// ============================================================
var SCRIPT_URL = ''; // e.g. 'https://script.google.com/macros/s/.../exec'
var SCHOOL     = 'Bapuji Educational Institutions';

// ============================================================
// STATE
// ============================================================
var G = {
  user: null,
  url:  SCRIPT_URL,
  school: SCHOOL,
  inv: [], pur: [], bills: [], users: [], uSizes: [],
  classes: [], branches: [], billItems: []
};

// ============================================================
// STORAGE (persists URL/settings across sessions)
// ============================================================
function stGet(key, def) {
  try {
    var v = localStorage.getItem(key);
    return v !== null ? v : def;
  } catch(e) { return def; }
}
function stSet(key, val) {
  try { localStorage.setItem(key, val); } catch(e) {}
}

// Load saved settings on startup
(function() {
  var saved = stGet('bum_url', '');
  if (saved) G.url = saved;
  var school = stGet('bum_school', '');
  if (school) G.school = school;
  try { G.classes  = JSON.parse(stGet('bum_cls',  '[]')); } catch(e) { G.classes  = []; }
  try { G.branches = JSON.parse(stGet('bum_br',   '[]')); } catch(e) { G.branches = []; }
})();

// ============================================================
// API
// ============================================================
function hasUrl() {
  return G.url && G.url.indexOf('script.google.com') > -1;
}

function callApi(params, callback) {
  if (!hasUrl()) {
    callback(null, 'No Apps Script URL configured. Go to Settings.');
    return;
  }
  var qs = Object.keys(params).map(function(k) {
    var v = typeof params[k] === 'object' ? JSON.stringify(params[k]) : String(params[k]);
    return encodeURIComponent(k) + '=' + encodeURIComponent(v);
  }).join('&');

  var xhr = new XMLHttpRequest();
  xhr.open('GET', G.url + '?' + qs, true);
  xhr.timeout = 30000;
  xhr.onload = function() {
    try {
      var data = JSON.parse(xhr.responseText);
      callback(data, null);
    } catch(e) {
      callback(null, 'Invalid response from server.');
    }
  };
  xhr.onerror   = function() { callback(null, 'Network error. Check your connection.'); };
  xhr.ontimeout = function() { callback(null, 'Request timed out. Try again.'); };
  xhr.send();
}

// Promise wrapper
function api(params) {
  return new Promise(function(resolve) {
    callApi(params, function(data, err) {
      if (err) { toast(err, 'e'); resolve(null); }
      else resolve(data);
    });
  });
}

// ============================================================
// AUTH — admin/admin123 ALWAYS works instantly
// ============================================================
function doLogin() {
  var u = ge('lu').value.trim();
  var p = ge('lp2').value.trim();

  if (!u || !p) { showAlert('Please enter username and password.'); return; }

  // admin/admin123 always logs in instantly (demo + offline fallback)
  if (u === 'admin' && p === 'admin123') {
    G.user = { id:'1', name:'Administrator', username:'admin', role:'Admin' };
    boot();
    if (hasUrl()) toast('Logged in as admin. Apps Script connected.', 's');
    else toast('Demo mode — configure Apps Script URL in Settings.', 'i');
    return;
  }

  // Other users need the API
  if (!hasUrl()) {
    showAlert('Apps Script URL not configured. Use <strong>admin / admin123</strong> to login and set the URL in Settings.');
    return;
  }

  showAlert('<i class="fas fa-spinner fa-spin"></i> Logging in...');
  api({ action:'login', username:u, password:p }).then(function(r) {
    if (r && r.success) {
      G.user = r.user;
      boot();
    } else {
      showAlert((r && r.message) || 'Login failed. Check your credentials.');
    }
  });
}

function showAlert(msg) {
  ge('la').innerHTML = '<div class="ald">' + msg + '</div>';
}

function boot() {
  ge('lp').style.display = 'none';
  ge('app').style.display = 'flex';
  ge('uname').textContent = G.user.name;
  ge('urole').textContent = G.user.role;
  ge('uav').textContent   = G.user.name[0].toUpperCase();
  if (G.user.role !== 'Admin') {
    document.querySelectorAll('.ao').forEach(function(e)  { e.style.display = 'none'; });
    document.querySelectorAll('.aos').forEach(function(e) { e.style.display = 'none'; });
  }
  loadMaster();
  sp('dash');
}

function logout() {
  G.user = null;
  ge('app').style.display = 'none';
  ge('lp').style.display  = 'flex';
  ge('la').innerHTML = '';
}

ge('lp2').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doLogin();
});

// ============================================================
// MASTER DATA (Branches & Classes)
// ============================================================
function loadMaster() {
  if (!hasUrl()) return;
  api({ action:'getBranches' }).then(function(r) {
    if (r && r.success && r.data.length) {
      G.branches = r.data.map(function(b) { return b.Name; });
      stSet('bum_br', JSON.stringify(G.branches));
    }
  });
  api({ action:'getClasses' }).then(function(r) {
    if (r && r.success && r.data.length) {
      G.classes = r.data.map(function(c) { return c.Name; });
      stSet('bum_cls', JSON.stringify(G.classes));
    }
  });
}

// ============================================================
// NAVIGATION
// ============================================================
var PAGE_TITLES = {
  dash:'Dashboard', uni:'Uniforms', inv:'Inventory', pur:'Purchase Inward',
  bill:'New Bill', bills:'All Bills', rpt:'Reports', bal:'Balance Stock',
  usr:'User Management', set:'Settings'
};

function sp(pg) {
  document.querySelectorAll('nav a').forEach(function(a) { a.classList.remove('act'); });
  var n = ge('nav-' + pg); if (n) n.classList.add('act');
  ge('pt').textContent = PAGE_TITLES[pg] || pg;
  ge('ha').innerHTML   = '';
  var pages = {
    dash:pgDash, uni:pgUni, inv:pgInv, pur:pgPur,
    bill:pgBill, bills:pgBills, rpt:pgRpt, bal:pgBal,
    usr:pgUsr, set:pgSet
  };
  if (pages[pg]) pages[pg]();
  window.scrollTo(0, 0);
}

function sc(h) { ge('ct').innerHTML = h; }
function ld()  { sc('<div class="ld"><div class="sp"></div> Loading...</div>'); }

// ============================================================
// TOAST
// ============================================================
function toast(msg, type) {
  type = type || 's';
  var icons = { s:'check-circle', e:'times-circle', i:'info-circle' };
  var d = document.createElement('div');
  d.className = 'toast t' + type;
  d.innerHTML = '<i class="fas fa-' + icons[type] + '"></i> ' + msg;
  ge('tc').appendChild(d);
  setTimeout(function() { d.remove(); }, 3500);
}

// ============================================================
// MODAL
// ============================================================
function modal(id, title, body, footer) {
  var el = ge(id);
  if (!el) {
    el = document.createElement('div');
    el.id = id; el.className = 'mo'; el.style.display = 'none';
    el.onclick = function(e) { if (e.target === el) cM(id); };
    document.body.appendChild(el);
  }
  el.innerHTML =
    '<div class="md">' +
      '<div class="mh"><h3>' + title + '</h3><span class="mc" onclick="cM(\'' + id + '\')">&#215;</span></div>' +
      '<div class="mb">' + body + '</div>' +
      (footer ? '<div class="mf">' + footer + '</div>' : '') +
    '</div>';
  el.style.display = 'flex';
}
function cM(id) { var e = ge(id); if (e) e.style.display = 'none'; }

// ============================================================
// HELPERS
// ============================================================
function ge(id)  { return document.getElementById(id); }
function gv(id)  { var e = ge(id); return e ? e.value : ''; }
function fm(n)   { return (+n||0).toLocaleString('en-IN', {minimumFractionDigits:0, maximumFractionDigits:2}); }
function tid()   { return new Date().toISOString().split('T')[0]; }

function fmtDate(s) {
  if (!s || s === '—') return '—';
  if (typeof s === 'object') {
    var dt = new Date(s);
    return pad(dt.getDate())+'-'+pad(dt.getMonth()+1)+'-'+dt.getFullYear();
  }
  s = String(s).trim();
  if (/^\d{2}[\/\-]\d{2}[\/\-]\d{4}$/.test(s)) return s.replace(/\//g, '-');
  if (/^\d{4}-\d{2}-\d{2}T/.test(s)) {
    var dt = new Date(s);
    return pad(dt.getDate())+'-'+pad(dt.getMonth()+1)+'-'+dt.getFullYear();
  }
  if (/^\d{4}-\d{2}-\d{2}$/.test(s)) { var p=s.split('-'); return p[2]+'-'+p[1]+'-'+p[0]; }
  return s;
}

function pad(n) { return String(n).padStart(2, '0'); }

function dNum(s) {
  if (!s) return 0;
  if (typeof s === 'object') {
    var dt = new Date(s);
    return +(String(dt.getFullYear()) + pad(dt.getMonth()+1) + pad(dt.getDate()));
  }
  s = String(s).trim();
  if (/^\d{2}[\/\-]\d{2}[\/\-]\d{4}$/.test(s)) { var p=s.split(/[\/\-]/); return +(p[2]+p[1]+p[0]); }
  if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return +s.replace(/-/g,'');
  return 0;
}

function sbg(s) {
  var c = {Paid:'bgs', Partial:'bws', Due:'bds'};
  return '<span class="badge '+(c[s]||'bis')+'">'+s+'</span>';
}

function esc(o) { return JSON.stringify(o).replace(/'/g, "&#39;"); }

function purDateToInput(d) {
  if (!d) return tid();
  var s = String(d).trim();
  if (/^\d{2}-\d{2}-\d{4}$/.test(s)) { var p=s.split('-'); return p[2]+'-'+p[1]+'-'+p[0]; }
  return tid();
}

function uRows(data) {
  if (!data.length) return '<tr><td colspan="5"><div class="es"><i class="fas fa-tshirt"></i>No uniforms yet</div></td></tr>';
  return data.map(function(u, i) {
    var sz = []; try { sz = JSON.parse(u.Sizes||'[]'); } catch(e) {}
    return '<tr><td>'+(i+1)+'</td><td><strong>'+u.Name+'</strong></td>' +
           '<td><span class="badge bis">'+u.Category+'</span></td>' +
           '<td>'+sz.map(function(s){return '<span class="badge bgs" style="margin:1px">'+s.size+' ₹'+s.price+'</span>';}).join('')+'</td>' +
           '<td><button class="btn bo bsm" onclick=\'editU('+esc(u)+')\'><i class="fas fa-edit"></i></button> ' +
           '<button class="btn br bsm" onclick="delU(\''+u.ID+'\',\''+u.Name+'\')"><i class="fas fa-trash"></i></button></td></tr>';
  }).join('');
}

function filterU() {
  var q = gv('usrch').toLowerCase();
  var f = (window._udata||[]).filter(function(u) { return (u.Name+u.Category).toLowerCase().indexOf(q) > -1; });
  document.querySelector('#utbl tbody').innerHTML = uRows(f);
}

function openAddUni() {
  G.uSizes = [{ size:'', price:'', minStock:5 }];

    '<button class="btn bo" onclick="cM(\'um\')">Cancel</button>' +

function uForm(nm, ct) {
  return '<div class="fr">' +
    '<div class="fg"><label>Name *</label><input id="un" value="'+nm+'" placeholder="e.g. School Shirt"></div>' +
    '<div class="fg"><label>Category *</label><select id="uc">' +
    ['Top Wear','Bottom Wear','Accessories','Footwear','Other'].map(function(c){
      return '<option'+(c===ct?' selected':'')+'>'+c+'</option>';

    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">' +
    '<strong style="font-size:13px">Sizes & Pricing</strong>' +

    '<tbody id="szb">'+szR()+'</tbody></table>';

function szR() {
  return G.uSizes.map(function(s, i) {
    return '<tr>' +
      '<td><input value="'+s.size+'" onchange="G.uSizes['+i+'].size=this.value" placeholder="S,M,L,XL,36"></td>' +
      '<td><input type="number" value="'+s.price+'" onchange="G.uSizes['+i+'].price=this.value" placeholder="0"></td>' +
      '<td><input type="number" value="'+(s.minStock||5)+'" onchange="G.uSizes['+i+'].minStock=this.value" placeholder="5"></td>' +

function addSR() { G.uSizes.push({size:'',price:'',minStock:5}); ge('szb').innerHTML = szR(); }
function rmSR(i) { G.uSizes.splice(i,1); ge('szb').innerHTML = szR(); }

function saveUni(eid) {
  var nm = gv('un'), ct = gv('uc');
  if (!nm) { toast('Enter uniform name','e'); return; }
  var vs = G.uSizes.filter(function(s) { return s.size; });
  if (!vs.length) { toast('Add at least one size','e'); return; }
  var params = {
    action: eid ? 'updateUniform' : 'addUniform',
    name: nm, category: ct,
    sizes: JSON.stringify(vs.map(function(s) { return {size:s.size, price:+s.price||0, minStock:+s.minStock||5}; }))
  };
  if (eid) params.id = eid;
  api(params).then(function(r) {
    if (r && r.success) { toast(eid ? 'Updated' : 'Uniform added'); cM('um'); pgUni(); }
    else toast((r&&r.message)||'Failed','e');
  });
}

function editU(u) {
  var sz = []; try { sz = JSON.parse(u.Sizes||'[]'); } catch(e) {}
  G.uSizes = sz.length ? sz.map(function(s){return{size:s.size,price:s.price,minStock:s.minStock||5};}) : [{size:'',price:'',minStock:5}];
  modal('um', 'Edit Uniform', uForm(u.Name, u.Category),
    '<button class="btn bo" onclick="cM(\'um\')">Cancel</button>' +
    '<button class="btn bp" onclick="saveUni(\''+u.ID+'\')">Update</button>');
}

function delU(id, nm) {
  if (!confirm('Delete "'+nm+'"?')) return;
  api({ action:'deleteUniform', id:id }).then(function(r) {
    if (r&&r.success) { toast('Deleted'); pgUni(); } else toast('Failed','e');
  });
}

      '<button class="btn bo bsm" onclick="pgInv()"><i class="fas fa-sync"></i></button>';
    var low = G.inv.filter(function(i) { return +i.Stock <= +i.MinStock; }).length;

    G.inv.forEach(function(i) { var k=i.UniformName||'?'; if(!grp[k])grp[k]=[]; grp[k].push(i); });

      '<div><strong>'+low+' items</strong> at or below minimum stock!</div></div>' : '') +

      '<p style="font-size:12px;color:#888;margin-bottom:12px;margin-top:-8px">Stock = Purchases − Sales (updates automatically)</p>' +
      '<div id="invcards">';
    Object.keys(grp).forEach(function(nm) {
      var items = grp[nm];
      html += '<div class="card" data-inv><div class="ch"><h3><i class="fas fa-tshirt" style="color:var(--pr);margin-right:6px"></i>'+nm+'</h3></div>' +
        '<div class="tw"><table><thead><tr><th>Size</th><th>Price</th><th>Purchased</th><th>Sold</th><th>Stock</th><th>Min Stock</th><th>Status</th><th>Edit</th></tr></thead><tbody>';
      items.forEach(function(i) {
        var st = +i.Stock<=0 ? '<span class="badge bds">Out of Stock</span>' :
                 +i.Stock<=+i.MinStock ? '<span class="badge bws">Low Stock</span>' : '<span class="badge bgs">In Stock</span>';
        html += '<tr><td><strong>'+i.Size+'</strong></td><td>₹'+fm(i.Price)+'</td>' +
          '<td>'+i.Purchased+'</td><td>'+i.Sold+'</td>' +
          '<td class="'+(+i.Stock<=+i.MinStock?'sl':'sk')+'"><strong>'+i.Stock+'</strong></td>' +

          '<td><button class="btn bo bsm" onclick=\'editInv('+esc(i)+')\'><i class="fas fa-edit"></i></button></td></tr>';
      });
      html += '</tbody></table></div></div>';
    });
    if (!G.inv.length) html += '<div class="es"><i class="fas fa-boxes"></i><p>No inventory. Add uniforms first.</p></div>';
    sc(html + '</div>');
  });
}

}

function updBS() {
  var tot = G.billItems.reduce(function(s,i){return s+i.total;},0);
  var pd  = +gv('bpd')||0, bl = tot-pd;
  ge('bic').textContent  = G.billItems.length+' item(s)';
  ge('btot').textContent = '₹'+fm(tot);
  if (ge('bbal')) {
    ge('bbal').textContent = '₹'+fm(Math.max(0,bl));
    var st = bl<=0?'Paid':pd>0?'Partial':'Due';
    ge('bst').className   = 'badge '+(st==='Paid'?'bgs':st==='Partial'?'bws':'bds');
    ge('bst').textContent = st;
  }
}

function rfrBI() {
  var tb = ge('bit');
  if (!G.billItems.length) {
    tb.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:20px;color:#aaa">No items.</td></tr>';
    updBS(); return;
  }
  tb.innerHTML = G.billItems.map(function(it,i) {
    return '<tr><td>'+it.uniformName+'</td><td>'+it.size+'</td><td>'+it.qty+'</td>' +
           '<td>₹'+fm(it.unitPrice)+'</td><td><strong>₹'+fm(it.total)+'</strong></td>' +
           '<td><button class="btn br bsm" onclick="rmBI('+i+')"><i class="fas fa-times"></i></button></td></tr>';
  }).join('');
  updBS();
}

function openBI() {
  var unames = [];
  G.inv.forEach(function(i) { if (unames.indexOf(i.UniformName)<0) unames.push(i.UniformName); });
  modal('bim', 'Add Item to Bill',
    '<div class="fg"><label>Uniform *</label><select id="biu" onchange="loadBISz()"><option value="">-- Select --</option>' +
    unames.map(function(n){return'<option>'+n+'</option>';}).join('') + '</select></div>' +
    '<div class="fg"><label>Size *</label><select id="bisz" onchange="loadBIP()"><option>Select uniform first</option></select></div>' +
    '<div class="fr">' +
    '<div class="fg"><label>Qty *</label><input type="number" id="biqty" value="1" min="1"></div>' +
    '<div class="fg"><label>Unit Price (₹) *</label><input type="number" id="bip" min="0" step="0.01"></div>' +
    '</div><div id="bisi" style="font-size:13px;color:#777;margin-top:2px"></div>',
    '<button class="btn bo" onclick="cM(\'bim\')">Cancel</button>' +
    '<button class="btn bp" onclick="addBI()">Add to Bill</button>');
}

function loadBISz() {
  var nm = gv('biu');
  var items = G.inv.filter(function(i){return i.UniformName===nm&&+i.Stock>0;});
  ge('bisz').innerHTML = items.length
    ? items.map(function(i){
        return '<option value="'+i.Size+'" data-p="'+i.Price+'" data-s="'+i.Stock+'">'+i.Size+' (Stock: '+i.Stock+')</option>';
      }).join('')
    : '<option value="">Out of stock</option>';
  ge('bisz').selectedIndex = 0;
  loadBIP();
}

function loadBIP() {
  var o = ge('bisz').options[ge('bisz').selectedIndex];
  if (!o) return;
  ge('bip').value = o.dataset.p || '';
  ge('bisi').textContent = o.dataset.s ? 'Available: '+o.dataset.s+' units' : '';
}

function addBI() {
  var un=gv('biu'), sz=gv('bisz'), qty=+gv('biqty'), price=+gv('bip');
  if (!un||!sz||!qty||!price) { toast('Fill all fields','e'); return; }
  var o = ge('bisz').options[ge('bisz').selectedIndex];
  if (qty > +o.dataset.s) { toast('Only '+o.dataset.s+' in stock!','e'); return; }
  G.billItems.push({ uniformName:un, size:sz, qty:qty, unitPrice:price, total:qty*price });
  cM('bim'); rfrBI();
}

function rmBI(i) { G.billItems.splice(i,1); rfrBI(); }

function saveBill() {
  var br=gv('bbr'), cl=gv('bc'), nm=gv('bn');
  if (!br)   { toast('Select branch','e'); return; }
  if (!cl)   { toast('Select class','e'); return; }
  if (!nm)   { toast('Enter student name','e'); return; }
  if (!G.billItems.length) { toast('Add at least one item','e'); return; }
  api({ action:'addBill', branch:br, studentName:nm, class:cl,
        admissionNo:gv('ba'), phone:gv('bph'), date:gv('bd'),
        paidAmount:gv('bpd')||'0', paymentMode:gv('bmd'), notes:gv('bnt'),
        items:JSON.stringify(G.billItems) }).then(function(r) {
    if (r && r.success) {
      if (r.message && r.message.indexOf('NOT') > -1) toast('⚠️ '+r.message,'e');
      else toast('Bill created! '+r.receiptNo);
      showRcpt({ receiptNo:r.receiptNo, branch:br, studentName:nm, class:cl,
                 date:gv('bd'), paymentMode:gv('bmd'), items:G.billItems,
                 total:r.total, balance:r.balance, PaidAmount:+gv('bpd')||0 });
      G.billItems = [];
      api({ action:'getInventory' }).then(function(ir) { if(ir&&ir.success) G.inv=ir.data; });
    } else toast((r&&r.message)||'Failed','e');
  });
}

  ld();
  api({ action:'getBills' }).then(function(r) {
    G.bills = (r&&r.success) ? r.data : [];
    ge('ha').innerHTML =

      '<button class="btn bp bsm" onclick="sp(\'bill\')"><i class="fas fa-plus"></i> New Bill</button>';
    var tot = G.bills.reduce(function(s,b){return s+(+b.TotalAmount);},0);
    var col = G.bills.reduce(function(s,b){return s+(+b.PaidAmount);},0);
    var due = G.bills.reduce(function(s,b){return s+(+b.Balance);},0);
    var brO = '<option value="">All Branches</option>'+G.branches.map(function(b){return'<option>'+b+'</option>';}).join('');
    sc('<div class="smr">' +

       '<div class="spl">Sales: <span>₹'+fm(tot)+'</span></div>' +
       '<div class="spl">Collected: <span>₹'+fm(col)+'</span></div>' +
       '<div class="spl">Outstanding: <span>₹'+fm(due)+'</span></div></div>' +
       '<div class="card"><div class="ch"><h3>All Bills</h3>' +
       '<div style="display:flex;gap:8px;flex-wrap:wrap">' +
       '<input type="text" id="bsrch" placeholder="🔍 Name/receipt..." style="padding:7px 12px;border:1.5px solid #ddd;border-radius:8px;font-size:13px" oninput="filterBills()">' +
       '<select id="brfil" style="padding:7px;border:1.5px solid #ddd;border-radius:8px;font-size:13px" onchange="filterBills()">'+brO+'</select>' +
       '<select id="bsfil" style="padding:7px;border:1.5px solid #ddd;border-radius:8px;font-size:13px" onchange="filterBills()">' +
       '<option value="">All Status</option><option>Paid</option><option>Partial</option><option>Due</option></select>' +
       '</div></div>' +
       '<div class="tw"><table id="btbl"><thead><tr><th>Receipt</th><th>Date</th><th>Branch</th>' +
       '<th>Student</th><th>Class</th><th>Total</th><th>Paid</th><th>Balance</th>' +
       '<th>Mode</th><th>Status</th><th>Actions</th></tr></thead>' +
       '<tbody>'+bRows(G.bills)+'</tbody></table></div></div>');
  });
}

function bRows(data) {
  if (!data.length) return '<tr><td colspan="11"><div class="es"><i class="fas fa-file-invoice"></i>No bills found</div></td></tr>';
  return data.slice().reverse().map(function(b) {
    var isP = b.Status==='Partial', isD = b.Status==='Due';
    return '<tr>' +
      '<td><strong>'+b.ReceiptNo+'</strong></td>' +
      '<td>'+fmtDate(b.Date)+'</td>' +
      '<td>'+(b.Branch||'—')+'</td>' +
      '<td>'+b.StudentName+'</td>' +
      '<td>'+b.Class+'</td>' +
      '<td>₹'+fm(b.TotalAmount)+'</td>' +
      '<td>₹'+fm(b.PaidAmount)+'</td>' +
      '<td class="'+(+b.Balance>0?'sl':'')+'">₹'+fm(b.Balance)+'</td>' +
      '<td>'+b.PaymentMode+'</td>' +
      '<td>'+sbg(b.Status)+'</td>' +
      '<td style="white-space:nowrap">' +
        '<button class="btn bo bsm" onclick="viewRcpt(\''+b.ID+'\')" title="Print"><i class="fas fa-print"></i></button> ' +
        ((isP||isD) ? '<button class="btn bp bsm" onclick="updPay(\''+b.ID+'\',\''+b.TotalAmount+'\',\''+b.PaidAmount+'\',\''+b.PaymentMode+'\')" title="Update Payment"><i class="fas fa-rupee-sign"></i></button> ' : '') +
        (isP ? '<button class="btn bg bsm" onclick="compPay(\''+b.ID+'\',\''+b.TotalAmount+'\')" title="Complete Payment"><i class="fas fa-check-double"></i></button> ' : '') +
        '<button class="btn br bsm" onclick="delBill(\''+b.ID+'\',\''+b.ReceiptNo+'\')" title="Delete"><i class="fas fa-trash"></i></button>' +
      '</td></tr>';
  }).join('');
}

function filterBills() {
  var q=gv('bsrch').toLowerCase(), s=gv('bsfil'), br=gv('brfil');
  var f = G.bills.filter(function(b) {
    return (b.StudentName+b.ReceiptNo+b.Class+(b.AdmissionNo||'')).toLowerCase().indexOf(q) > -1
      && (!s || b.Status===s) && (!br || b.Branch===br);
  });
  document.querySelector('#btbl tbody').innerHTML = bRows(f);
}

function viewRcpt(bid) {
  var b = G.bills.filter(function(x){return x.ID===bid;})[0];
  if (!b) return;
  api({ action:'getBillItems', billId:bid }).then(function(r) {
    showRcpt({ receiptNo:b.ReceiptNo, branch:b.Branch, studentName:b.StudentName,
               class:b.Class, date:b.Date, paymentMode:b.PaymentMode,
               items:(r&&r.success)?r.data:[], total:b.TotalAmount,
               balance:b.Balance, PaidAmount:b.PaidAmount });
  });
}

function updPay(id, tot, cur, mode) {
  var rem = Math.max(0, +tot-(+cur));
  modal('paym', 'Update Payment',
    '<div class="psm">' +
    '<div class="pb" style="background:#f0f4f8"><div class="pl2">Total</div><div class="pv">₹'+fm(tot)+'</div></div>' +
    '<div class="pb" style="background:#e8f5e9"><div class="pl2">Paid</div><div class="pv" style="color:#2e7d32">₹'+fm(cur)+'</div></div>' +
    '<div class="pb" style="background:#ffebee"><div class="pl2">Remaining</div><div class="pv" style="color:#c62828">₹'+fm(rem)+'</div></div>' +
    '</div>' +
    '<button class="btn bg bfl" onclick="savePay(\''+id+'\','+tot+')" style="margin-bottom:14px;padding:11px">' +
    '<i class="fas fa-check-double"></i> Complete Full Payment — ₹'+fm(tot)+'</button>' +
    '<div style="text-align:center;color:#aaa;font-size:12px;margin-bottom:14px">— or enter custom amount —</div>' +
    '<div class="fg"><label>Amount Paid (₹)</label><input type="number" id="pa" value="'+cur+'" max="'+tot+'" min="0" step="0.01"></div>' +
    '<div class="fg"><label>Payment Mode</label><select id="pm2">' +
    ['Cash','Online/UPI','Cheque','DD'].map(function(m){return'<option'+(m===mode?' selected':'')+'>'+m+'</option>';}).join('') +
    '</select></div>',
    '<button class="btn bo" onclick="cM(\'paym\')">Cancel</button>' +
    '<button class="btn bp" onclick="savePay(\''+id+'\')">Update Payment</button>');
}

function savePay(id, fullTot) {
  var amt  = fullTot !== undefined ? fullTot : +gv('pa');
  var mode = ge('pm2') ? gv('pm2') : 'Cash';
  api({ action:'updateBillPayment', id:id, paidAmount:amt, paymentMode:mode }).then(function(r) {
    if (r&&r.success) { toast('Payment updated — '+r.status); cM('paym'); pgBills(); }
    else toast('Failed','e');
  });
}

function compPay(id, tot) {
  if (!confirm('Mark as fully paid? ₹'+fm(tot))) return;
  api({ action:'updateBillPayment', id:id, paidAmount:tot, paymentMode:'Cash' }).then(function(r) {
    if (r&&r.success) { toast('Marked fully paid ✓'); pgBills(); } else toast('Failed','e');
  });
}

function delBill(id, rno) {
  if (!confirm('Delete bill '+rno+'? Cannot be undone.')) return;
  api({ action:'deleteBill', id:id }).then(function(r) {
    if (r&&r.success) { toast('Deleted'); pgBills(); } else toast('Failed','e');
  });
}

function expBillsXL() {
  var ws = XLSX.utils.json_to_sheet(G.bills.map(function(b) {
    return {'Receipt':b.ReceiptNo, Date:fmtDate(b.Date), Branch:b.Branch,
            Student:b.StudentName, Class:b.Class, 'Adm No':b.AdmissionNo,
            'Total(₹)':b.TotalAmount, 'Paid(₹)':b.PaidAmount, 'Balance(₹)':b.Balance,
            Mode:b.PaymentMode, Status:b.Status};
  }));
  var wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, 'Bills');
  XLSX.writeFile(wb, 'Bapuji_Bills_'+tid()+'.xlsx'); toast('Exported!');
}

       '<div class="fg" style="margin:0"><label>Class</label><input id="rcl" placeholder="Filter" style="padding:9px 12px;border:1.5px solid #ddd;border-radius:8px;font-size:13px;width:100px"></div>' +
       '<button class="btn bp" onclick="genRpt()"><i class="fas fa-chart-bar"></i> Generate</button>' +
       '<button class="btn bo" onclick="expRptXL()"><i class="fas fa-file-excel"></i> Export</button>' +
       '</div></div></div><div id="rout"></div>');
    genRpt();
  });
}

function genRpt() {
  var from=gv('rf'), to=gv('rt'), st=gv('rs'), cl=(gv('rcl')||'').toLowerCase(), br=gv('rbr');
  var fN=dNum(from), tN=to?dNum(to):99999999;
  var f = G.bills.filter(function(b) {
    var bN = dNum(b.Date);
    return bN>=fN && bN<=tN && (!st||b.Status===st) && (!cl||b.Class.toLowerCase().indexOf(cl)>-1) && (!br||b.Branch===br);
  });
  var tot=f.reduce(function(s,b){return s+(+b.TotalAmount);},0);
  var col=f.reduce(function(s,b){return s+(+b.PaidAmount);},0);
  var due=f.reduce(function(s,b){return s+(+b.Balance);},0);
  var rows = f.length
    ? f.slice().reverse().map(function(b) {
        return '<tr><td>'+b.ReceiptNo+'</td><td>'+fmtDate(b.Date)+'</td>' +
               '<td>'+(b.Branch||'—')+'</td><td>'+b.StudentName+'</td><td>'+b.Class+'</td>' +
               '<td>₹'+fm(b.TotalAmount)+'</td><td>₹'+fm(b.PaidAmount)+'</td>' +
               '<td class="'+(+b.Balance>0?'sl':'')+'">₹'+fm(b.Balance)+'</td><td>'+sbg(b.Status)+'</td></tr>';
      }).join('')
    : '<tr><td colspan="9" style="text-align:center;padding:20px;color:#aaa">No data for selected range</td></tr>';
  ge('rout').innerHTML = kpiHtml(tot,col,due,f.filter(function(b){return b.Status==='Due';}).length) +
    '<div class="card"><div class="ch"><h3>Bills ('+f.length+')</h3></div>' +
    '<div class="tw"><table><thead><tr><th>Receipt</th><th>Date</th><th>Branch</th>' +
    '<th>Student</th><th>Class</th><th>Total</th><th>Paid</th><th>Balance</th><th>Status</th></tr></thead>' +
    '<tbody>'+rows+'</tbody></table></div></div>';
  window._rd = f;
}

function expRptXL() {
  var d = window._rd||[]; if (!d.length) { toast('No data','e'); return; }
  var ws = XLSX.utils.json_to_sheet(d.map(function(b) {
    return {Receipt:b.ReceiptNo, Date:fmtDate(b.Date), Branch:b.Branch,
            Student:b.StudentName, Class:b.Class, Total:b.TotalAmount,
            Paid:b.PaidAmount, Balance:b.Balance, Status:b.Status};
  }));
  var wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, 'Report');
  XLSX.writeFile(wb, 'Bapuji_Report_'+tid()+'.xlsx'); toast('Exported!');
}

// ============================================================
// BALANCE STOCK
// ============================================================
function pgBal() {
  ld();
  ge('ha').innerHTML =
    '<button class="btn bo bsm" onclick="expBalXL()"><i class="fas fa-file-excel"></i> Export</button>' +
    '<button class="btn bo bsm" onclick="pgBal()"><i class="fas fa-sync"></i></button>';
  api({ action:'getInventory' }).then(function(r) {
    if (!r||!r.success) {
      sc('<div class="es"><i class="fas fa-exclamation-triangle" style="color:#e65100"></i>' +
         '<p>Failed to load.</p><button class="btn bp bsm" style="margin-top:14px" onclick="pgBal()">Retry</button></div>');
      return;
    }
    G.inv = r.data;
    var tPur=0, tSold=0, tBal=0, tVal=0;
    G.inv.forEach(function(i) {
      tPur  += i.Purchased||0; tSold += i.Sold||0;
      tBal  += +i.Stock||0;   tVal  += (+i.Stock||0)*(+i.Price||0);
    });
    var grp = {};
    G.inv.forEach(function(i){var k=i.UniformName||'?';if(!grp[k])grp[k]=[];grp[k].push(i);});
    var html = '<div class="kg">' +
      '<div class="kc"><div class="ki" style="background:#e3f2fd"><i class="fas fa-truck" style="color:#1565c0"></i></div><div><div class="kv">'+tPur+'</div><div class="kl">Total Purchased</div></div></div>' +
      '<div class="kc"><div class="ki" style="background:#fce4ec"><i class="fas fa-shopping-cart" style="color:#c62828"></i></div><div><div class="kv">'+tSold+'</div><div class="kl">Total Sold</div></div></div>' +
      '<div class="kc"><div class="ki" style="background:#e8f5e9"><i class="fas fa-boxes" style="color:#2e7d32"></i></div><div><div class="kv">'+tBal+'</div><div class="kl">Balance Stock</div></div></div>' +
      '<div class="kc"><div class="ki" style="background:#fff3e0"><i class="fas fa-rupee-sign" style="color:#e65100"></i></div><div><div class="kv">₹'+fm(tVal)+'</div><div class="kl">Stock Value</div></div></div>' +
      '</div>' +
      '<div class="sr"><input type="text" id="bssrch" placeholder="🔍 Search..." oninput="filterBal()"></div>' +
      '<div id="balcards">';
    Object.keys(grp).forEach(function(nm) {
      var items = grp[nm];
      var gV = items.reduce(function(s,i){return s+((+i.Stock||0)*(+i.Price||0));},0);
      html += '<div class="card" data-bal>' +
        '<div class="ch"><h3><i class="fas fa-tshirt" style="color:var(--pr);margin-right:6px"></i>'+nm+'</h3>' +
        '<small style="color:#999">Value: ₹'+fm(gV)+'</small></div>' +
        '<div class="tw"><table><thead><tr><th>Size</th><th>Price</th><th>Purchased</th><th>Sold</th>' +
        '<th>Balance Stock</th><th>Stock Value</th><th>Status</th></tr></thead><tbody>';
      items.forEach(function(i) {
        html += '<tr><td><strong>'+i.Size+'</strong></td><td>₹'+fm(i.Price)+'</td>' +
          '<td>'+i.Purchased+'</td><td>'+i.Sold+'</td>' +
          '<td class="'+(+i.Stock<=+i.MinStock?'sl':'sk')+'"><strong>'+i.Stock+'</strong></td>' +
          '<td>₹'+fm((+i.Stock||0)*(+i.Price||0))+'</td>' +
          '<td>'+(+i.Stock<=0?'<span class="badge bds">Out of Stock</span>':+i.Stock<=+i.MinStock?'<span class="badge bws">Low Stock</span>':'<span class="badge bgs">In Stock</span>')+'</td></tr>';
      });
      html += '</tbody></table></div></div>';
    });
    if (!G.inv.length) html += '<div class="es"><i class="fas fa-warehouse"></i><p>No inventory. Add uniforms and record purchases first.</p></div>';
    sc(html + '</div>');
    window._bd = G.inv;
  });
}

function filterBal() {
  var q = gv('bssrch').toLowerCase();
  document.querySelectorAll('[data-bal]').forEach(function(c) {
    c.style.display = c.textContent.toLowerCase().indexOf(q) > -1 ? '' : 'none';
  });
}

function expBalXL() {
  var d = window._bd||[]; if (!d.length) { toast('No data','e'); return; }
  var ws = XLSX.utils.json_to_sheet(d.map(function(i) {
    return {Uniform:i.UniformName, Size:i.Size, Price:i.Price, Purchased:i.Purchased,
            Sold:i.Sold, 'Balance Stock':i.Stock, 'Stock Value':(+i.Stock)*(+i.Price), 'Min Stock':i.MinStock};
  }));
  var wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, 'Balance Stock');
  XLSX.writeFile(wb, 'Bapuji_BalanceStock_'+tid()+'.xlsx'); toast('Exported!');
}

// ============================================================
// USERS
// ============================================================
function pgUsr() {
  if (G.user.role !== 'Admin') { sc('<div class="es"><i class="fas fa-lock"></i><p>Admin access only</p></div>'); return; }
  ld();
  api({ action:'getUsers' }).then(function(r) {
    G.users = (r&&r.success) ? r.data : [];
    ge('ha').innerHTML = '<button class="btn bp bsm" onclick="openAddUsr()"><i class="fas fa-user-plus"></i> Add User</button>';
    var rows = G.users.map(function(u, i) {
      return '<tr><td>'+(i+1)+'</td><td><strong>'+u.Name+'</strong></td><td>'+u.Username+'</td>' +
             '<td><span class="badge '+(u.Role==='Admin'?'bis':'bgs')+'">'+u.Role+'</span></td>' +
             '<td>'+(String(u.Active)==='TRUE'||u.Active===true?'<span class="badge bgs">Active</span>':'<span class="badge bds">Inactive</span>')+'</td>' +
             '<td><button class="btn bo bsm" onclick=\'editUsr('+esc(u)+')\'><i class="fas fa-edit"></i></button> ' +
             (u.Username!=='admin'?'<button class="btn br bsm" onclick="delUsr(\''+u.ID+'\',\''+u.Name+'\')"><i class="fas fa-trash"></i></button>':'')+
             '</td></tr>';
    }).join('');
    sc('<div class="card"><div class="ch"><h3>Users ('+G.users.length+')</h3></div>' +
       '<div class="tw"><table><thead><tr><th>#</th><th>Name</th><th>Username</th><th>Role</th><th>Status</th><th>Actions</th></tr></thead>' +
       '<tbody>'+rows+'</tbody></table></div></div>');
  });
}

function openAddUsr() {
  modal('um2','Add User',
    '<div class="fr"><div class="fg"><label>Full Name *</label><input id="ufn" placeholder="Name"></div>' +
    '<div class="fg"><label>Username *</label><input id="uum" placeholder="Login username"></div></div>' +
    '<div class="fr"><div class="fg"><label>Password *</label><input type="password" id="upw" placeholder="Password"></div>' +
    '<div class="fg"><label>Role</label><select id="urol"><option value="Staff">Staff</option><option value="Admin">Admin</option></select></div></div>',
    '<button class="btn bo" onclick="cM(\'um2\')">Cancel</button>' +
    '<button class="btn bp" onclick="saveUsr()">Add User</button>');
}

function saveUsr(eid) {
  var n=gv('ufn'), un=gv('uum'), pw=gv('upw'), role=gv('urol');
  if (!n||!un||(!eid&&!pw)) { toast('Fill required fields','e'); return; }
  var p = { action:eid?'updateUser':'addUser', name:n, username:un, role:role };
  if (eid) { p.id=eid; if(pw) p.password=pw; } else p.password=pw;
  api(p).then(function(r) {
    if (r&&r.success) { toast(eid?'Updated':'User added'); cM('um2'); pgUsr(); }
    else toast((r&&r.message)||'Failed','e');
  });
}

function editUsr(u) {
  modal('um2','Edit User',
    '<div class="fr"><div class="fg"><label>Full Name *</label><input id="ufn" value="'+u.Name+'"></div>' +
    '<div class="fg"><label>Username</label><input id="uum" value="'+u.Username+'" disabled style="background:#f5f5f5"></div></div>' +
    '<div class="fr"><div class="fg"><label>New Password</label><input type="password" id="upw" placeholder="Leave blank to keep"></div>' +
    '<div class="fg"><label>Role</label><select id="urol"><option value="Staff"'+(u.Role==='Staff'?' selected':'')+'>Staff</option>' +
    '<option value="Admin"'+(u.Role==='Admin'?' selected':'')+'>Admin</option></select></div></div>',
    '<button class="btn bo" onclick="cM(\'um2\')">Cancel</button>' +
    '<button class="btn bp" onclick="saveUsr(\''+u.ID+'\')">Update</button>');
}

function delUsr(id, nm) {
  if (!confirm('Delete user "'+nm+'"?')) return;
  api({ action:'deleteUser', id:id }).then(function(r) {
    if (r&&r.success) { toast('Deleted'); pgUsr(); } else toast('Failed','e');
  });
}

// ============================================================
// SETTINGS
// ============================================================
function pgSet() {
  sc('<div class="card"><div class="ch"><h3>⚙️ App Settings</h3></div><div class="cb">' +
     '<div class="fg"><label>School / Institution Name</label><input id="ssch" value="'+G.school+'" placeholder="School name"></div>' +
     '<div class="fg" style="margin-top:12px"><label>Google Apps Script Web App URL</label>' +
     '<input id="surl" value="'+G.url+'" placeholder="https://script.google.com/macros/s/YOUR_ID/exec">' +
     '<small style="color:#999;font-size:12px">Paste your deployed Apps Script URL here</small></div>' +
     '<button class="btn bp" onclick="saveSet()" style="margin-top:10px"><i class="fas fa-save"></i> Save Settings</button>' +
     '</div></div>' +

     '<div class="card"><div class="ch"><h3>🏢 Branch Management</h3><span class="badge bis" id="brc">'+G.branches.length+' branches</span></div><div class="cb">' +
     '<div class="ma"><input id="nbr" placeholder="e.g. Main Campus, Nellore Branch" onkeydown="if(event.key===\'Enter\')addBr()"><button class="btn bp" onclick="addBr()"><i class="fas fa-plus"></i> Add</button></div>' +
     '<div id="brl">'+brList()+'</div></div></div>' +

     '<div class="card"><div class="ch"><h3>🏫 Class Management</h3><span class="badge bis" id="clc">'+G.classes.length+' classes</span></div><div class="cb">' +
     '<div class="ma"><input id="ncl" placeholder="e.g. 1st A, 6th B, 10th C" onkeydown="if(event.key===\'Enter\')addCl()"><button class="btn bp" onclick="addCl()"><i class="fas fa-plus"></i> Add</button></div>' +
     '<div id="cll">'+clList()+'</div></div></div>' +

     '<div class="card"><div class="ch"><h3>🚀 New Google Sheet Setup</h3></div><div class="cb">' +
     '<ol style="font-size:14px;line-height:2.4;color:#555;padding-left:20px">' +
     '<li>Go to <a href="https://sheets.google.com" target="_blank" style="color:var(--pr)">sheets.google.com</a> → Create new blank sheet</li>' +
     '<li>Click <strong>Extensions → Apps Script</strong></li>' +
     '<li>Delete all existing code → Paste the <strong>Apps Script Code.gs</strong> (second artifact)</li>' +
     '<li>Press <strong>Ctrl+S</strong> to save</li>' +
     '<li>Click <strong>Deploy → New Deployment</strong></li>' +
     '<li>Click ⚙️ gear → Select type: <strong>Web App</strong></li>' +
     '<li>Execute as: <strong>Me</strong> | Who has access: <strong>Anyone</strong></li>' +
     '<li>Click <strong>Deploy</strong> → Authorize → Copy the <strong>Web App URL</strong></li>' +
     '<li>Paste the URL in the field above → Click <strong>Save Settings</strong></li>' +
     '<li>Click <strong>Initialize Sheets</strong> below ↓</li>' +
     '</ol>' +
     '<button class="btn bg" onclick="initSheets()" style="margin-top:12px"><i class="fas fa-database"></i> Initialize Google Sheets</button>' +
     '<p style="margin-top:10px;font-size:12px;color:#aaa">This creates all sheet tabs automatically. Default login: <strong>admin / admin123</strong></p>' +
     '</div></div>');
}

function saveSet() {
  G.url    = gv('surl').trim();
  G.school = gv('ssch').trim() || 'Bapuji Educational Institutions';
  stSet('bum_url',    G.url);
  stSet('bum_school', G.school);
  toast('Settings saved!');
  if (hasUrl()) loadMaster();
}

function initSheets() {
  if (!hasUrl()) { toast('Save URL first','e'); return; }
  toast('Initializing...','i');
  api({ action:'init' }).then(function(r) {
    if (r&&r.success) { toast('Sheets initialized! Login: admin / admin123'); loadMaster(); }
    else toast((r&&r.message)||'Failed','e');
  });
}

function brList() {
  if (!G.branches.length) return '<p style="color:#aaa;font-size:13px;text-align:center;padding:10px">No branches yet.</p>';
  return '<div class="pw">'+G.branches.map(function(b,i){
    return '<div class="pl"><i class="fas fa-building" style="color:var(--pr);font-size:11px"></i>'+b+'<span class="px" onclick="rmBr('+i+')">&times;</span></div>';
  }).join('')+'</div>';
}

function clList() {
  if (!G.classes.length) return '<p style="color:#aaa;font-size:13px;text-align:center;padding:10px">No classes yet.</p>';
  return '<div class="pw">'+G.classes.map(function(c,i){
    return '<div class="pl"><i class="fas fa-graduation-cap" style="color:var(--pr);font-size:11px"></i>'+c+'<span class="px" onclick="rmCl('+i+')">&times;</span></div>';
  }).join('')+'</div>';
}

function addBr() {
  var v = ge('nbr').value.trim();
  if (!v) { toast('Enter branch name','e'); return; }
  if (G.branches.indexOf(v) > -1) { toast('Already exists','e'); return; }
  if (hasUrl()) {
    api({ action:'addBranch', name:v }).then(function(r) {
      if (!r||!r.success) { toast((r&&r.message)||'Failed','e'); return; }
      G.branches.push(v); stSet('bum_br', JSON.stringify(G.branches));
      ge('nbr').value = ''; ge('brl').innerHTML = brList();
      if(ge('brc')) ge('brc').textContent = G.branches.length+' branches';
      toast('Branch added');
    });
  } else {
    G.branches.push(v); stSet('bum_br', JSON.stringify(G.branches));
    ge('nbr').value = ''; ge('brl').innerHTML = brList();
    if(ge('brc')) ge('brc').textContent = G.branches.length+' branches';
    toast('Branch added (local)');
  }
}

function rmBr(i) {
  var nm = G.branches[i];
  if (!confirm('Remove "'+nm+'"?')) return;
  if (hasUrl()) {
    api({ action:'deleteBranch', name:nm }).then(function(r) {
      if (!r||!r.success) { toast('Failed','e'); return; }
      G.branches.splice(i,1); stSet('bum_br', JSON.stringify(G.branches));
      ge('brl').innerHTML = brList();
      if(ge('brc')) ge('brc').textContent = G.branches.length+' branches';
      toast('Removed');
    });
  } else {
    G.branches.splice(i,1); stSet('bum_br', JSON.stringify(G.branches));
    ge('brl').innerHTML = brList();
    if(ge('brc')) ge('brc').textContent = G.branches.length+' branches';
    toast('Removed (local)');
  }
}

function addCl() {
  var v = ge('ncl').value.trim();
  if (!v) { toast('Enter class name','e'); return; }
  if (G.classes.indexOf(v) > -1) { toast('Already exists','e'); return; }
  if (hasUrl()) {
    api({ action:'addClass', name:v }).then(function(r) {
      if (!r||!r.success) { toast((r&&r.message)||'Failed','e'); return; }
      G.classes.push(v); stSet('bum_cls', JSON.stringify(G.classes));
      ge('ncl').value = ''; ge('cll').innerHTML = clList();
      if(ge('clc')) ge('clc').textContent = G.classes.length+' classes';
      toast('Class added');
    });
  } else {
    G.classes.push(v); stSet('bum_cls', JSON.stringify(G.classes));
    ge('ncl').value = ''; ge('cll').innerHTML = clList();
    if(ge('clc')) ge('clc').textContent = G.classes.length+' classes';
    toast('Class added (local)');
  }
}

function rmCl(i) {
  var nm = G.classes[i];
  if (!confirm('Remove "'+nm+'"?')) return;
  if (hasUrl()) {
    api({ action:'deleteClass', name:nm }).then(function(r) {
      if (!r||!r.success) { toast('Failed','e'); return; }
      G.classes.splice(i,1); stSet('bum_cls', JSON.stringify(G.classes));
      ge('cll').innerHTML = clList();
      if(ge('clc')) ge('clc').textContent = G.classes.length+' classes';
      toast('Removed');
    });
  } else {
    G.classes.splice(i,1); stSet('bum_cls', JSON.stringify(G.classes));
    ge('cll').innerHTML = clList();
    if(ge('clc')) ge('clc').textContent = G.classes.length+' classes';
    toast('Removed (local)');
  }
}
</script>
